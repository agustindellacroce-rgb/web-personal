<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    @keyframes bar1 {
      0%, 100% { height: 6px; }
      50% { height: 16px; }
    }
    @keyframes bar2 {
      0%, 100% { height: 12px; }
      50% { height: 20px; }
    }
    @keyframes bar3 {
      0%, 100% { height: 9px; }
      50% { height: 14px; }
    }
    
    .bar {
      fill: #FF7000;
      transform-origin: bottom;
    }
    
    .bar1 {
      animation: bar1 1.2s ease-in-out infinite;
    }
    
    .bar2 {
      animation: bar2 1.5s ease-in-out infinite;
    }
    
    .bar3 {
      animation: bar3 1.3s ease-in-out infinite;
    }
  </style>
  
  <!-- Tres barras de ecualizador animadas -->
  <rect class="bar bar1" x="8" y="10" width="4" height="6" rx="2"/>
  <rect class="bar bar2" y="4" x="14" width="4" height="12" rx="2"/>
  <rect class="bar bar3" x="20" y="7" width="4" height="9" rx="2"/>
</svg>

